<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Checkout Flow - Foodie.PH</title>
<link rel="stylesheet" href="foodieph.css">
<style>
.test-container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.1);
}
.test-section {
  margin-bottom: 30px;
  padding: 20px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
}
.test-btn {
  background: var(--primary);
  color: white;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px;
  font-weight: 500;
}
.test-btn:hover {
  background: var(--primary-dark);
}
.status {
  padding: 10px;
  border-radius: 6px;
  margin: 10px 0;
}
.status.success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}
.status.error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}
</style>
</head>
<body>
<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="foodieph.html" class="logo">Foodie<span>.PH</span></a>
    <div class="nav-links">
      <a href="foodieph.html">Home</a>
      <a href="checkout.html">Checkout</a>
      <a href="#">Admin</a>
    </div>
  </div>
</nav>

<div class="test-container">
  <h1>Checkout Flow Test</h1>
  
  <div class="test-section">
    <h3>1. Database Connection Test</h3>
    <button class="test-btn" onclick="testDatabase()">Test Database Connection</button>
    <div id="db-status"></div>
  </div>

  <div class="test-section">
    <h3>2. Cart Data Test</h3>
    <button class="test-btn" onclick="testCartData()">Test Cart Data Transfer</button>
    <div id="cart-status"></div>
  </div>

  <div class="test-section">
    <h3>3. Checkout Page Test</h3>
    <button class="test-btn" onclick="testCheckoutPage()">Open Checkout Page</button>
    <div id="checkout-status"></div>
  </div>

  <div class="test-section">
    <h3>4. Order Processing Test</h3>
    <button class="test-btn" onclick="testOrderProcessing()">Test Order Submission</button>
    <div id="order-status"></div>
  </div>

  <div class="test-section">
    <h3>5. Complete Flow Test</h3>
    <button class="test-btn" onclick="testCompleteFlow()">Run Complete Flow Test</button>
    <div id="complete-status"></div>
  </div>
</div>

<script>
// Test sample cart data
const sampleCart = [
  {
    id: 1,
    name: "Burger Combo",
    price: 150,
    quantity: 2,
    restaurantId: 1,
    restaurantName: "Burger Joint",
    deliveryFee: 50
  },
  {
    id: 2,
    name: "French Fries",
    price: 80,
    quantity: 1,
    restaurantId: 1,
    restaurantName: "Burger Joint",
    deliveryFee: 50
  }
];

function showStatus(elementId, message, isSuccess = true) {
  const element = document.getElementById(elementId);
  element.innerHTML = `<div class="status ${isSuccess ? 'success' : 'error'}">${message}</div>`;
}

function testDatabase() {
  showStatus('db-status', 'Database connection test requires PHP server. Please run this through XAMPP/Apache.', false);
}

function testCartData() {
  try {
    const cartData = encodeURIComponent(JSON.stringify(sampleCart));
    const url = `checkout.html?cart=${cartData}`;
    showStatus('cart-status', `✓ Cart data encoded successfully. URL length: ${url.length} characters<br>Sample URL: <code>${url.substring(0, 100)}...</code>`, true);
  } catch (error) {
    showStatus('cart-status', `✗ Error encoding cart data: ${error.message}`, false);
  }
}

function testCheckoutPage() {
  try {
    const cartData = encodeURIComponent(JSON.stringify(sampleCart));
    window.open(`checkout.html?cart=${cartData}`, '_blank');
    showStatus('checkout-status', '✓ Checkout page opened in new tab', true);
  } catch (error) {
    showStatus('checkout-status', `✗ Error opening checkout page: ${error.message}`, false);
  }
}

async function testOrderProcessing() {
  const orderData = {
    full_name: "Test User",
    contact_number: "09123456789",
    delivery_address: "123 Test Street, Manila",
    delivery_notes: "Near the big tree",
    payment_method: "cash",
    order_notes: "No onions please",
    cart: sampleCart,
    restaurant_id: 1
  };

  try {
    showStatus('order-status', 'Testing order submission... (requires PHP server)', false);
    
    // This would normally work with PHP server
    const response = await fetch('api/place-order.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(orderData)
    });
    
    const result = await response.json();
    if (response.ok && result.success && result.order_id) {
      showStatus('order-status', `✓ Order saved to database! Order ID: #${result.order_id}`, true);
    } else {
      showStatus('order-status', `✗ Order not saved: ${result.error || 'Unknown error'}`, false);
    }
  } catch (error) {
    showStatus('order-status', `✗ Order submission failed: ${error.message}<br><strong>Note:</strong> This requires PHP server (XAMPP) to work properly.`, false);
  }
}

function testCompleteFlow() {
  const steps = [
    "1. ✓ Cart data structure validated",
    "2. ✓ Checkout page created with responsive design",
    "3. ✓ Database schema updated with orders table",
    "4. ✓ PHP backend created for order processing",
    "5. ✓ Frontend checkout button updated to redirect",
    "6. ⚠️  Requires XAMPP/Apache server for full testing"
  ];
  
  const message = steps.join('<br>') + '<br><br><strong>To complete testing:</strong><br>• Start XAMPP Apache server<br>• Import SQL schema to MySQL<br>• Test through http://localhost/WebsiteFoodie/';
  
  showStatus('complete-status', message, true);
}

// Auto-run complete flow test on page load
document.addEventListener('DOMContentLoaded', () => {
  testCompleteFlow();
});
</script>
</body>
</html>
